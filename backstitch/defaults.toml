exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  ".pytest_cache",
  ".mypy_cache",
  ".ruff_cache",
  "dist",
  "build",
  ".worktrees",
]

[defaults]
schema_version = 1

[profile]
name = "backstitch-style-v1"
spec_roots = ["docs/specs"]
plan_roots = ["docs/plans"]
code_roots = ["backstitch", "tests"]
test_roots = ["tests"]
planned_spec_globs = []
exploratory_spec_globs = []
meta_spec_globs = []
process_spec_globs = []

[check]
format = "text"
warnings_as_errors = false

[analyze]
concurrency = 1

[diagnostics]
default_level = "warning"
fail_on = ["error"]
suppressible_levels = ["warning", "info"]

[[diagnostics.levels]]
select = [
  "SCAN_ROOT_MISSING",
  "FILE_UNREADABLE",
  "SPEC_FILE_MISSING",
  "SPEC_SECTION_MISSING",
  "SPEC_ANCHOR_MISSING",
  "REF_RANGE_UNSUPPORTED",
  "TARGET_PATH_AMBIGUOUS",
  "MAPPING_SYMBOL_MISSING",
  "SPEC_SECTION_AMBIGUOUS:asserted",
  "MAPPING_PATH_MISSING:required",
  "INVARIANT_UNTESTED:required",
  "INVARIANT_UNKNOWN",
  "INVARIANT_DUPLICATE",
  "INVARIANT_MARKER_INVALID",
]
level = "error"

[[diagnostics.levels]]
select = [
  "SPEC_SECTION_UNMAPPED",
  "CODE_REF_UNMAPPED_FROM_SPEC",
]
level = "info"

[[diagnostics.levels]]
select = [
  "SPEC_SECTION_AMBIGUOUS:weak",
  "MAPPING_PATH_MISSING:plan-artifact",
  "INVARIANT_UNTESTED:draft",
  "INVARIANT_BINDING_NOT_TEST",
]
level = "warning"

[diagnostics.registry.SCAN_ROOT_MISSING]
short = "BST001"
status = "implemented"
summary = "Configured spec, plan, or code root was not found"

[diagnostics.registry.FILE_UNREADABLE]
short = "BST002"
status = "implemented"
summary = "File could not be read while scanning"

[diagnostics.registry.CONFIG_TOML_INVALID]
short = "BST003"
status = "reserved"
summary = "Configuration TOML could not be parsed"

[diagnostics.registry.CONFIG_FILE_MISSING]
short = "BST004"
status = "reserved"
summary = "Requested configuration file was not found"

[diagnostics.registry.CONFIG_EXTEND_MISSING]
short = "BST005"
status = "reserved"
summary = "Extended configuration file was not found"

[diagnostics.registry.CONFIG_EXTEND_CYCLE]
short = "BST006"
status = "reserved"
summary = "Configuration extend chain contains a cycle"

[diagnostics.registry.CONFIG_UNKNOWN_KEY]
short = "BST007"
status = "reserved"
summary = "Configuration contains an unknown key"

[diagnostics.registry.CONFIG_TYPE_INVALID]
short = "BST008"
status = "reserved"
summary = "Configuration value has the wrong type"

[diagnostics.registry.CONFIG_VALUE_INVALID]
short = "BST009"
status = "reserved"
summary = "Configuration value is outside the allowed vocabulary"

[diagnostics.registry.CONFIG_PROFILE_UNKNOWN]
short = "BST010"
status = "reserved"
summary = "Configuration names an unknown built-in profile"

[diagnostics.registry.REPORT_JSON_INVALID]
short = "BST011"
status = "reserved"
summary = "Deterministic report JSON could not be parsed"

[diagnostics.registry.REPORT_SHAPE_INVALID]
short = "BST012"
status = "reserved"
summary = "Deterministic report does not match the expected shape"

[diagnostics.registry.REPORT_SUMMARY_MISMATCH]
short = "BST013"
status = "reserved"
summary = "Deterministic report summary disagrees with report contents"

[diagnostics.registry.OUTPUT_WRITE_FAILED]
short = "BST014"
status = "reserved"
summary = "Requested output file could not be written"

[diagnostics.registry.REPO_ROOT_INVALID]
short = "BST015"
status = "reserved"
summary = "Repository root is invalid"

[diagnostics.registry.INTERNAL_ERROR]
short = "BST016"
status = "reserved"
summary = "Backstitch hit an internal failure"

[diagnostics.registry.SPEC_FILE_MISSING]
short = "BSS001"
status = "implemented"
summary = "Referenced spec file does not exist"

[diagnostics.registry.SPEC_SECTION_MISSING]
short = "BSS002"
