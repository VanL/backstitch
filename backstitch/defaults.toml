[diagnostics.registry.SPEC_SECTION_AMBIGUOUS]
short = "BSS003"
status = "implemented"
summary = "Bare section ID matches multiple sections"
contexts = ["asserted", "weak"]

[diagnostics.registry.SPEC_SECTION_DUPLICATE]
short = "BSS004"
status = "implemented"
summary = "Section ID is defined more than once"

[diagnostics.registry.SPEC_ANCHOR_MISSING]
short = "BSS005"
status = "implemented"
summary = "File anchor reference was not found"

[diagnostics.registry.REF_RANGE_UNSUPPORTED]
short = "BSS006"
status = "implemented"
