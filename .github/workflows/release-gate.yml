name: Release Gate (backstitch)

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.11"
  PACKAGE_NAME: backstitch
  PACKAGE_DIR: .

jobs:
  require-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require CI and local-llm workflows to be green
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python .github/scripts/require_green_workflows.py \
            --workflow "CI" \
            --workflow "local-llm"

  verify-tag-current:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - require-ci
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release gate was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  build:
    needs:
      - require-ci
      - verify-tag-current
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.11"
          enable-cache: true

      - name: Verify checked out commit matches tested release commit
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_PYPROJECT="${PACKAGE_DIR}/pyproject.toml"
          python - "$TAG_VERSION" "$PACKAGE_PYPROJECT" <<'PY'
          import sys
          import tomllib

          tag = sys.argv[1]
          pyproject_path = sys.argv[2]
          with open(pyproject_path, "rb") as pyproject_file:
              package_version = tomllib.load(pyproject_file)["project"]["version"]
          if package_version != tag:
              raise SystemExit(f"tag {tag} != pyproject version {package_version}")
          PY

      - name: Build package
        working-directory: ${{ env.PACKAGE_DIR }}
        run: |
          uv build

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.PACKAGE_DIR }}/dist/*

      - name: Stage attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p attestations
          safe_tag="$(printf '%s' "${TAG_NAME}" | tr '/:' '--')"
          cp "${BUNDLE_PATH}" "attestations/${PACKAGE_NAME}-${safe_tag}.sigstore.json"

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: ${{ env.PACKAGE_DIR }}/dist/

      - name: Store the attestation bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-attestations
          path: attestations/*.sigstore.json

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 50
    environment:
      name: pypi
      url: https://pypi.org/p/backstitch
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Upload to GitHub Release
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-python-package-distributions
          path: dist/

      - name: Download attestation bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-attestations
          path: attestations/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            attestations/*.sigstore.json
